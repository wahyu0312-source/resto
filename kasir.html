<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartResto POS - Dashboard Kasir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Khusus untuk Printer Thermal Kasir */
    @media print {
      body * { visibility: hidden; } 
      #print-area, #print-area * { visibility: visible; } 
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 58mm; 
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <!-- ================= VIEW 1: LAYAR LOGIN ================= -->
  <div id="login-view" class="min-h-screen flex items-center justify-center bg-gray-200">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full">
      <h2 class="text-2xl font-bold text-center text-indigo-900 mb-6">🔒 Login Kasir</h2>
      
      <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
      <input type="text" id="login-user" placeholder="Contoh: kasir1" class="w-full mb-4 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
      
      <label class="block text-sm font-bold text-gray-700 mb-1">PIN</label>
      <input type="password" id="login-pin" placeholder="Masukkan PIN" class="w-full mb-6 p-3 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
      
      <button onclick="doLogin()" id="btn-login" class="w-full bg-indigo-600 text-white font-bold p-3 rounded hover:bg-indigo-700 transition">Masuk Dashboard</button>
      
      <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden font-bold">Username atau PIN salah!</p>
    </div>
  </div>

  <!-- ================= VIEW 2: LAYAR DASHBOARD KASIR (Awalnya Disembunyikan) ================= -->
  <div id="dashboard-view" class="hidden">
    
    <!-- Navigasi Kasir -->
    <nav class="bg-indigo-900 text-white p-4 shadow-md sticky top-0 z-40">
      <div class="flex justify-between items-center max-w-6xl mx-auto">
        <h1 class="text-xl font-bold">🖥️ Dashboard Kasir</h1>
        <div class="flex gap-2">
          <button onclick="loadData()" class="bg-indigo-700 hover:bg-indigo-600 px-3 py-1 rounded text-sm font-bold transition">🔄 Refresh</button>
          <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm font-bold transition">Logout</button>
        </div>
      </div>
    </nav>

    <!-- Area Konten -->
    <div class="max-w-6xl mx-auto p-4 mt-4 grid grid-cols-1 md:grid-cols-3 gap-6">
      
      <!-- Panel Kiri: Laporan & Notifikasi -->
      <div class="md:col-span-1">
        
        <!-- Wadah untuk Notifikasi Panggilan Pelayan -->
        <div id="notif-panel" class="mb-4 space-y-2"></div>
        
        <!-- Wadah Laporan Hari Ini -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 sticky top-24">
          <h3 class="font-bold text-indigo-900 mb-4 text-lg">📊 Laporan Hari Ini</h3>
          <div class="bg-indigo-50 p-4 rounded-lg mb-4 border border-indigo-100">
            <p class="text-sm text-gray-600">Total Pesanan Selesai</p>
            <p class="text-3xl font-bold text-indigo-700" id="total-orders-count">0</p>
          </div>
          <div class="bg-green-50 p-4 rounded-lg border border-green-100">
            <p class="text-sm text-gray-600">Total Pendapatan</p>
            <p class="text-2xl font-bold text-green-700">Rp <span id="total-revenue">0</span></p>
          </div>
        </div>
      </div>

      <!-- Panel Kanan: Daftar Antrean Pesanan -->
      <div class="md:col-span-2">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Antrean Pesanan</h2>
        <div id="orders-container" class="space-y-4">
          <p class="text-gray-500 animate-pulse">Menunggu data pesanan masuk...</p>
        </div>
      </div>

    </div>
  </div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    // MASUKKAN URL API GOOGLE APPS SCRIPT ANDA DI SINI
    // Pastikan URL di bawah ini adalah URL Deployment TERBARU Anda.
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';
    
    let refreshInterval;

    // -----------------------------------------
    // 1. FITUR LOGIN KASIR
    // -----------------------------------------
    async function doLogin() {
      const user = document.getElementById('login-user').value;
      const pin = document.getElementById('login-pin').value;
      const btn = document.getElementById('btn-login');
      const err = document.getElementById('login-error');
      
      if(!user || !pin) return alert("Harap isi Username dan PIN");

      btn.innerText = "Memeriksa ke server...";
      btn.disabled = true;
      err.classList.add('hidden');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'verifyLogin', username: user, pin: pin })
        });
        const result = await response.json();
        
        if(result.success) {
          // Login Sukses: Pindah ke tampilan Dashboard
          document.getElementById('login-view').classList.add('hidden');
          document.getElementById('dashboard-view').classList.remove('hidden');
          
          // Mulai muat data pesanan dan aktifkan auto-refresh (10 detik)
          loadData();
          refreshInterval = setInterval(loadData, 10000); 
        } else {
          // Login Gagal
          err.classList.remove('hidden');
        }
      } catch (error) {
        alert("Gagal koneksi ke server. Pastikan internet aktif.");
      } finally {
        btn.innerText = "Masuk Dashboard";
        btn.disabled = false;
      }
    }

    function logout() {
      clearInterval(refreshInterval); // Hentikan auto-refresh
      document.getElementById('login-view').classList.remove('hidden');
      document.getElementById('dashboard-view').classList.add('hidden');
      document.getElementById('login-user').value = '';
      document.getElementById('login-pin').value = '';
    }

    // -----------------------------------------
    // 2. FITUR MUAT DATA (PANGGILAN & PESANAN)
    // -----------------------------------------
    function loadData() {
      loadNotif();  // Tarik data panggilan pelayan
      loadOrders(); // Tarik data antrean pesanan
    }

    // --- A. NOTIFIKASI PANGGILAN PELAYAN ---
    async function loadNotif() {
      try {
        const response = await fetch(`${API_URL}?action=getNotif`);
        const data = await response.json();
        const panel = document.getElementById('notif-panel');
        panel.innerHTML = '';

        data.forEach(notif => {
          panel.innerHTML += `
            <div class="bg-red-500 text-white p-4 rounded-xl shadow-md flex justify-between items-center animate-pulse">
              <div>
                <p class="font-bold text-xl">🚨 Meja ${notif.Meja}</p>
                <p class="text-sm">Minta Bantuan / Panggil Pelayan</p>
                <p class="text-xs text-red-200 mt-1">${notif.Waktu}</p>
              </div>
              <button onclick="resolveNotif('${notif.ID_Notif}')" class="bg-white text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-gray-100 shadow">
                Selesai
              </button>
            </div>
          `;
        });
      } catch(e) { console.error("Gagal muat notif", e); }
    }

    async function resolveNotif(idNotif) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'resolveNotif', idNotif: idNotif })
        });
        loadNotif(); // Refresh panel notifikasi agar hilang dari layar
      } catch(e) { alert("Gagal update status notifikasi"); }
    }

    // --- B. ANTREAN PESANAN KASIR ---
    async function loadOrders() {
      try {
        const response = await fetch(`${API_URL}?action=getOrders`);
        const ordersData = await response.json();
        renderOrders(ordersData);
      } catch (error) {
        console.error("Gagal muat pesanan", error);
      }
    }

    function renderOrders(ordersData) {
      const container = document.getElementById('orders-container');
      container.innerHTML = '';
      
      let grandTotal = 0;
      let count = 0;

      ordersData.forEach(ord => {
        let itemsHTML = "";
        let safeItemsJSON = "[]"; 
        
        try {
          const items = JSON.parse(ord.Pesanan_JSON);
          safeItemsJSON = JSON.stringify(items).replace(/'/g, "\\'"); 
          items.forEach(i => {
            itemsHTML += `<li class="text-sm text-gray-700 py-1 border-b border-gray-100 last:border-0">- ${i.qty}x ${i.nama} <span class="float-right text-gray-500">(Rp ${i.sub.toLocaleString('id-ID')})</span></li>`;
          });
        } catch(e) { 
          itemsHTML = "<li class='text-red-500'>Error membaca format menu pesanan</li>"; 
        }

        // Hitung total laporan hari ini
        if(ord.Status_Pesanan === 'Paid' || ord.Status_Pesanan === 'Served') {
          grandTotal += Number(ord.Total_Harga);
          count++;
        }

        // Tentukan warna label status
        let badgeColor = "bg-gray-200 text-gray-800";
        if(ord.Status_Pesanan === 'Pending') badgeColor = "bg-yellow-100 text-yellow-800 border border-yellow-300 animate-pulse";
        if(ord.Status_Pesanan === 'In Progress') badgeColor = "bg-blue-100 text-blue-800 border border-blue-300";
        if(ord.Status_Pesanan === 'Served') badgeColor = "bg-green-100 text-green-800 border border-green-300";
        if(ord.Status_Pesanan === 'Paid') badgeColor = "bg-gray-800 text-white";

        // Template HTML untuk setiap Pesanan (Card)
        const card = `
          <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-start mb-3 pb-3 border-b border-gray-100">
              <div>
                <h4 class="font-bold text-lg text-indigo-900">${ord.Order_ID} <span class="text-sm bg-indigo-100 text-indigo-800 px-2 py-1 rounded ml-2">Meja: ${ord.Meja}</span></h4>
                <p class="text-xs text-gray-400 mt-1">🕒 ${ord.Waktu}</p>
              </div>
              <span class="px-3 py-1 text-xs font-bold rounded-full ${badgeColor}">${ord.Status_Pesanan}</span>
            </div>
            
            <ul class="mb-4 bg-gray-50 p-3 rounded-lg">${itemsHTML}</ul>
            
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
              <p class="font-black text-xl text-gray-800">Rp ${Number(ord.Total_Harga).toLocaleString('id-ID')}</p>
              
              <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                <button onclick="printReceipt('${ord.Order_ID}', '${ord.Meja}', '${safeItemsJSON}', '${ord.Total_Harga}')" 
                        class="bg-gray-200 text-gray-800 font-bold text-sm px-4 py-2 rounded-lg hover:bg-gray-300 transition flex-1 lg:flex-none">
                  🖨️ Print
                </button>
                
                <button onclick="sendWhatsAppReceipt('${ord.Order_ID}', '${ord.Meja}', '${safeItemsJSON}', '${ord.Total_Harga}')" 
                        class="bg-green-500 text-white font-bold text-sm px-4 py-2 rounded-lg hover:bg-green-600 transition flex-1 lg:flex-none">
                  💬 WA
                </button>

                <select id="status-${ord.Order_ID}" onchange="updateStatus('${ord.Order_ID}')" 
                        class="text-sm border-2 border-indigo-200 rounded-lg p-2 focus:outline-none focus:border-indigo-500 font-bold text-indigo-700 w-full lg:w-auto cursor-pointer bg-white">
                  <option value="Pending" ${ord.Status_Pesanan === 'Pending'?'selected':''}>⏳ Pending</option>
                  <option value="In Progress" ${ord.Status_Pesanan === 'In Progress'?'selected':''}>🍳 In Progress</option>
                  <option value="Served" ${ord.Status_Pesanan === 'Served'?'selected':''}>🍽️ Served</option>
                  <option value="Paid" ${ord.Status_Pesanan === 'Paid'?'selected':''}>✅ Paid</option>
                </select>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });

      // Perbarui angka di laporan Dashboard
      document.getElementById('total-revenue').innerText = grandTotal.toLocaleString('id-ID');
      document.getElementById('total-orders-count').innerText = count;
    }

    async function updateStatus(orderId) {
      const select = document.getElementById(`status-${orderId}`);
      const newStatus = select.value;
      select.disabled = true;

      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', orderId: orderId, newStatus: newStatus })
        });
        loadOrders(); 
      } catch (error) {
        alert("Gagal update status pesanan.");
      } finally {
        select.disabled = false;
      }
    }

    // -----------------------------------------
    // 3. FITUR AKSI (CETAK & WHATSAPP)
    // -----------------------------------------
    function printReceipt(orderId, meja, itemsJSON, total) {
      let items = [];
      try { items = JSON.parse(itemsJSON); } catch(e) { return; }
      
      let printDiv = document.createElement('div');
      printDiv.id = 'print-area';
      
      let html = `
        <div style="text-align:center; font-weight:bold; margin-bottom:10px;">🍴 SMARTRESTO</div>
        <div>ID   : ${orderId}</div>
        <div>Meja : ${meja}</div>
        <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
      `;
      
      items.forEach(i => {
        html += `
          <div>${i.nama}</div>
          <div style="display:flex; justify-content:space-between;">
            <span>  ${i.qty}x</span>
            <span>${i.sub.toLocaleString('id-ID')}</span>
          </div>
        `;
      });
      
      html += `
        <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
          <span>TOTAL</span>
          <span>Rp ${Number(total).toLocaleString('id-ID')}</span>
        </div>
        <div style="text-align:center; margin-top:10px; font-size:10px;">Terima Kasih</div>
      `;
      
      printDiv.innerHTML = html;
      document.body.appendChild(printDiv);
      window.print();
      document.body.removeChild(printDiv);
    }

    function sendWhatsAppReceipt(orderId, meja, itemsJSON, total) {
      let items = [];
      try { items = JSON.parse(itemsJSON); } catch(e) { return; }
      
      let text = `*🍴 SMARTRESTO STRUK PESANAN*\n`;
      text += `Order ID: ${orderId}\n`;
      text += `Meja: ${meja}\n`;
      text += `------------------------\n`;
      
      items.forEach(i => {
        text += `${i.qty}x ${i.nama} (Rp ${i.sub.toLocaleString('id-ID')})\n`;
      });
      
      text += `------------------------\n`;
      text += `*TOTAL: Rp ${Number(total).toLocaleString('id-ID')}*\n\n`;
      text += `Terima kasih atas kunjungan Anda!`;

      const encodedText = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${encodedText}`, '_blank');
    }
  </script>
</body>
</html>
