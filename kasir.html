<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartResto POS - Dashboard Kasir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* CSS Khusus untuk Printer Thermal Kasir */
    @media print {
      body * { visibility: hidden; } /* Sembunyikan semua elemen UI */
      #print-area, #print-area * { visibility: visible; } /* Tampilkan hanya area struk */
      #print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 58mm; /* Standar printer thermal 58mm */
        font-family: 'Courier New', Courier, monospace;
        font-size: 12px;
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

  <!-- Navigasi Kasir -->
  <nav class="bg-indigo-900 text-white p-4 shadow-md sticky top-0 z-40">
    <div class="flex justify-between items-center max-w-6xl mx-auto">
      <h1 class="text-xl font-bold">🖥️ Dashboard Kasir</h1>
      <button onclick="loadOrders()" class="bg-indigo-700 hover:bg-indigo-600 px-4 py-2 rounded font-bold text-sm transition">
        🔄 Refresh Data
      </button>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto p-4 mt-4 grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- Panel Kiri: Laporan Hari Ini -->
    <div class="md:col-span-1">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 sticky top-24">
        <h3 class="font-bold text-indigo-900 mb-4 text-lg">📊 Laporan Hari Ini</h3>
        <div class="bg-indigo-50 p-4 rounded-lg mb-4">
          <p class="text-sm text-gray-600">Total Pesanan Selesai</p>
          <p class="text-3xl font-bold text-indigo-700" id="total-orders-count">0</p>
        </div>
        <div class="bg-green-50 p-4 rounded-lg">
          <p class="text-sm text-gray-600">Total Pendapatan</p>
          <p class="text-2xl font-bold text-green-700">Rp <span id="total-revenue">0</span></p>
        </div>
      </div>
    </div>

    <!-- Panel Kanan: Antrean Pesanan -->
    <div class="md:col-span-2">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">Antrean Pesanan</h2>
      <div id="orders-container" class="space-y-4">
        <p class="text-gray-500 animate-pulse">Memuat pesanan dari server...</p>
      </div>
    </div>

  </div>

  <script>
    // Gunakan URL GAS API yang sama dengan halaman pelanggan
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';

    window.onload = () => {
      loadOrders();
      // Auto-refresh antrean setiap 15 detik
      setInterval(loadOrders, 15000); 
    };

    // Fungsi mengambil data pesanan dari Google Sheets
    async function loadOrders() {
      try {
        const response = await fetch(`${API_URL}?action=getOrders`);
        const data = await response.json();
        renderOrders(data);
      } catch (error) {
        console.error("Gagal memuat pesanan", error);
        document.getElementById('orders-container').innerHTML = '<p class="text-red-500">Gagal terhubung ke server. Pastikan internet aktif.</p>';
      }
    }

    // Fungsi menampilkan pesanan di layar
    function renderOrders(ordersData) {
      const container = document.getElementById('orders-container');
      container.innerHTML = '';
      
      let grandTotal = 0;
      let count = 0;

      ordersData.forEach(ord => {
        let itemsHTML = "";
        let safeItemsJSON = "[]";
        
        try {
          const items = JSON.parse(ord.Pesanan_JSON);
          safeItemsJSON = JSON.stringify(items).replace(/'/g, "\\'"); 
          items.forEach(i => {
            itemsHTML += `<li class="text-sm text-gray-700 py-1 border-b border-gray-100 last:border-0">- ${i.qty}x ${i.nama} <span class="float-right text-gray-500">(Rp ${i.sub.toLocaleString('id-ID')})</span></li>`;
          });
        } catch(e) { 
          itemsHTML = "<li class='text-red-500'>Error format pesanan</li>"; 
        }

        // Hitung total khusus pesanan Paid/Served
        if(ord.Status_Pesanan === 'Paid' || ord.Status_Pesanan === 'Served') {
          grandTotal += Number(ord.Total_Harga);
          count++;
        }

        let badgeColor = "bg-gray-200 text-gray-800";
        if(ord.Status_Pesanan === 'Pending') badgeColor = "bg-yellow-100 text-yellow-800 border border-yellow-300 animate-pulse";
        if(ord.Status_Pesanan === 'In Progress') badgeColor = "bg-blue-100 text-blue-800 border border-blue-300";
        if(ord.Status_Pesanan === 'Served') badgeColor = "bg-green-100 text-green-800 border border-green-300";
        if(ord.Status_Pesanan === 'Paid') badgeColor = "bg-gray-800 text-white";

        const card = `
          <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-start mb-3 pb-3 border-b border-gray-100">
              <div>
                <h4 class="font-bold text-lg text-gray-800">${ord.Order_ID} <span class="text-sm bg-gray-100 px-2 py-1 rounded ml-2 text-gray-600">Meja: ${ord.Meja}</span></h4>
                <p class="text-xs text-gray-400 mt-1">🕒 ${ord.Waktu}</p>
              </div>
              <span class="px-3 py-1 text-xs font-bold rounded-full ${badgeColor}">${ord.Status_Pesanan}</span>
            </div>
            
            <ul class="mb-4 bg-gray-50 p-3 rounded-lg">${itemsHTML}</ul>
            
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
              <p class="font-black text-xl text-gray-800">Rp ${Number(ord.Total_Harga).toLocaleString('id-ID')}</p>
              
              <div class="flex flex-wrap gap-2 w-full lg:w-auto">
                <button onclick="printReceipt('${ord.Order_ID}', '${ord.Meja}', '${safeItemsJSON}', '${ord.Total_Harga}')" 
                        class="bg-gray-800 text-white font-bold text-sm px-4 py-2 rounded-lg hover:bg-gray-700 transition flex-1 lg:flex-none">
                  🖨️ Print
                </button>
                
                <button onclick="sendWhatsAppReceipt('${ord.Order_ID}', '${ord.Meja}', '${safeItemsJSON}', '${ord.Total_Harga}')" 
                        class="bg-green-500 text-white font-bold text-sm px-4 py-2 rounded-lg hover:bg-green-600 transition flex-1 lg:flex-none">
                  💬 WA
                </button>

                <select id="status-${ord.Order_ID}" onchange="updateStatus('${ord.Order_ID}')" 
                        class="text-sm border-2 border-gray-200 rounded-lg p-2 focus:outline-none focus:border-indigo-500 font-bold text-gray-700 w-full lg:w-auto cursor-pointer bg-white">
                  <option value="Pending" ${ord.Status_Pesanan === 'Pending'?'selected':''}>⏳ Pending</option>
                  <option value="In Progress" ${ord.Status_Pesanan === 'In Progress'?'selected':''}>🍳 In Progress</option>
                  <option value="Served" ${ord.Status_Pesanan === 'Served'?'selected':''}>🍽️ Served</option>
                  <option value="Paid" ${ord.Status_Pesanan === 'Paid'?'selected':''}>✅ Paid</option>
                </select>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += card;
      });

      document.getElementById('total-revenue').innerText = grandTotal.toLocaleString('id-ID');
      document.getElementById('total-orders-count').innerText = count;
    }

    // Fungsi kirim update status ke GAS
    async function updateStatus(orderId) {
      const select = document.getElementById(`status-${orderId}`);
      const newStatus = select.value;
      select.disabled = true;

      try {
        await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateStatus', orderId: orderId, newStatus: newStatus })
        });
        loadOrders(); // Refresh data setelah update
      } catch (error) {
        alert("Gagal update status.");
      } finally {
        select.disabled = false;
      }
    }

    // Fungsi Print Thermal Kasir
    function printReceipt(orderId, meja, itemsJSON, total) {
      let items = [];
      try { items = JSON.parse(itemsJSON); } catch(e) { return; }
      
      let printDiv = document.createElement('div');
      printDiv.id = 'print-area';
      
      let html = `
        <div style="text-align:center; font-weight:bold; margin-bottom:10px;">🍴 SMARTRESTO</div>
        <div>ID   : ${orderId}</div>
        <div>Meja : ${meja}</div>
        <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
      `;
      
      items.forEach(i => {
        html += `
          <div>${i.nama}</div>
          <div style="display:flex; justify-content:space-between;">
            <span>  ${i.qty}x</span>
            <span>${i.sub.toLocaleString('id-ID')}</span>
          </div>
        `;
      });
      
      html += `
        <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
          <span>TOTAL</span>
          <span>Rp ${Number(total).toLocaleString('id-ID')}</span>
        </div>
        <div style="text-align:center; margin-top:10px; font-size:10px;">Terima Kasih</div>
      `;
      
      printDiv.innerHTML = html;
      document.body.appendChild(printDiv);
      window.print();
      document.body.removeChild(printDiv);
    }

    // Fungsi Kirim Struk via WhatsApp
    function sendWhatsAppReceipt(orderId, meja, itemsJSON, total) {
      let items = [];
      try { items = JSON.parse(itemsJSON); } catch(e) { return; }
      
      let text = `*🍴 SMARTRESTO STRUK PESANAN*\n`;
      text += `Order ID: ${orderId}\n`;
      text += `Meja: ${meja}\n`;
      text += `------------------------\n`;
      
      items.forEach(i => {
        text += `${i.qty}x ${i.nama} (Rp ${i.sub.toLocaleString('id-ID')})\n`;
      });
      
      text += `------------------------\n`;
      text += `*TOTAL: Rp ${Number(total).toLocaleString('id-ID')}*\n\n`;
      text += `Terima kasih atas kunjungan Anda!`;

      const encodedText = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${encodedText}`, '_blank');
    }
  </script>
</body>
</html>
