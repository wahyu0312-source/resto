<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu Digital Eksklusif</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#18181b"> <!-- Zinc 900 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Premium: Playfair Display & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif-premium { font-family: 'Playfair Display', serif; }
    /* Hide scrollbar for cleaner look */
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="bg-stone-50 text-zinc-800 pb-32 antialiased">

  <!-- ================= HEADER EKSKLUSIF ================= -->
  <nav class="bg-zinc-900 text-stone-100 p-5 shadow-lg sticky top-0 z-40 rounded-b-3xl">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
      <div class="flex flex-col">
        <h1 class="text-2xl font-serif-premium tracking-wide text-amber-400">SmartResto</h1>
        <p class="text-xs text-zinc-400 tracking-widest uppercase mt-1">Fine Culinary Experience</p>
      </div>
      <div class="bg-zinc-800 border border-zinc-700 px-4 py-2 rounded-2xl flex items-center shadow-inner">
        <span class="text-xs text-zinc-400 mr-2 uppercase tracking-wide">Table</span>
        <span id="nomor-meja" class="font-bold text-amber-400 text-lg">1</span>
      </div>
    </div>
  </nav>

  <!-- ================= KONTEN MENU ================= -->
  <div class="max-w-4xl mx-auto p-5 mt-4">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-serif-premium text-zinc-900">Menu Pilihan Kami</h2>
      <div class="w-16 h-1 bg-amber-500 mx-auto mt-4 rounded-full"></div>
    </div>

    <!-- Grid Menu -->
    <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 gap-5">
      <div class="col-span-full flex justify-center py-10">
        <div class="animate-pulse flex flex-col items-center">
          <div class="w-10 h-10 border-4 border-zinc-200 border-t-amber-500 rounded-full animate-spin"></div>
          <p class="text-zinc-400 mt-4 text-sm tracking-wide">Menyiapkan hidangan...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= FLOATING CALL WAITER ================= -->
  <button onclick="callWaiter()" class="fixed bottom-28 right-5 w-14 h-14 bg-white border border-zinc-200 text-zinc-800 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex items-center justify-center z-30 hover:bg-zinc-50 transition-transform active:scale-95 group">
    <span class="text-2xl group-hover:animate-ping absolute opacity-20">🔔</span>
    <span class="text-2xl relative">🔔</span>
  </button>

  <!-- ================= FLOATING CART EKSKLUSIF ================= -->
  <div class="fixed bottom-6 left-0 right-0 z-40 px-5 pointer-events-none">
    <div class="max-w-4xl mx-auto pointer-events-auto">
      <button onclick="submitOrder()" class="w-full bg-zinc-900 text-white px-6 py-4 rounded-3xl shadow-[0_20px_40px_rgb(0,0,0,0.2)] flex justify-between items-center transform transition active:scale-[0.98]">
        <div class="flex items-center gap-3">
          <div class="bg-zinc-800 w-10 h-10 rounded-full flex items-center justify-center border border-zinc-700">
            <span>🛒</span>
          </div>
          <div class="text-left">
            <p class="text-xs text-zinc-400 font-medium">Keranjang Anda</p>
            <p class="font-bold text-sm"><span id="cart-count">0</span> Hidangan</p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-xs text-zinc-400 font-medium">Total Tagihan</p>
          <p class="font-bold text-amber-400 text-lg">Rp <span id="cart-total">0</span></p>
        </div>
      </button>
    </div>
  </div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    // MASUKKAN URL API ANDA DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';
    
    let globalMenu = [];
    let cart = JSON.parse(localStorage.getItem('resto_cart')) || []; 

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log('PWA SW Error'));
    }

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('meja')) document.getElementById('nomor-meja').innerText = urlParams.get('meja');

    window.onload = () => {
      fetchMenu();
      updateCartUI();
    };

    async function fetchMenu() {
      try {
        const response = await fetch(`${API_URL}?action=getMenu`);
        globalMenu = await response.json();
        renderMenu();
      } catch (error) {
        document.getElementById('menu-container').innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat menu. Mohon periksa koneksi.</p>';
      }
    }

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = '';

      // URL Placeholder Kelas Atas jika gambar GDrive gagal dimuat
      const fallbackImage = "https://images.unsplash.com/photo-1414235077428-33898dd1458c?auto=format&fit=crop&w=500&q=60";

      globalMenu.forEach(item => {
        if(item.Status === 'Tersedia') {
          // Desain Card Premium
          const card = `
            <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 overflow-hidden flex flex-col transition-transform duration-300 hover:-translate-y-1">
              <div class="h-40 md:h-56 bg-stone-200 relative overflow-hidden group">
                <img src="${item.URL_Gambar}" 
                     alt="${item.Nama}" 
                     onerror="this.onerror=null; this.src='${fallbackImage}';"
                     class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                     loading="lazy">
                <!-- Overlay Gradient untuk estetika -->
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
              </div>
              
              <div class="p-4 flex flex-col flex-grow">
                <h3 class="font-serif-premium font-bold text-base md:text-lg text-zinc-900 leading-snug">${item.Nama}</h3>
                <p class="text-xs text-zinc-500 mt-2 mb-4 line-clamp-2 leading-relaxed">${item.Deskripsi || 'Hidangan spesial disiapkan dengan bahan pilihan.'}</p>
                
                <div class="mt-auto pt-3 border-t border-stone-100 flex justify-between items-center">
                  <p class="text-zinc-900 font-bold text-sm md:text-base">Rp ${item.Harga.toLocaleString('id-ID')}</p>
                  
                  <button onclick="addToCart('${item.ID_Menu}')" 
                          class="bg-zinc-900 text-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold hover:bg-amber-500 hover:text-zinc-900 transition-colors shadow-md active:scale-90">
                    +
                  </button>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        }
      });
    }

    function addToCart(id) {
      const item = globalMenu.find(m => m.ID_Menu === id);
      const exist = cart.find(c => c.ID_Menu === id);
      if(exist) exist.qty++;
      else cart.push({...item, qty: 1});
      
      localStorage.setItem('resto_cart', JSON.stringify(cart));
      updateCartUI();
      
      // Feedback visual sederhana (Getaran di HP jika didukung)
      if (navigator.vibrate) navigator.vibrate(50);
    }

    function updateCartUI() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0);
      document.getElementById('cart-count').innerText = totalQty;
      document.getElementById('cart-total').innerText = totalPrice.toLocaleString('id-ID');
    }

    async function submitOrder() {
      if(cart.length === 0) return alert("Keranjang Anda masih kosong.");
      
      const confirmPesan = confirm(`Proses pesanan Anda dengan total Rp ${document.getElementById('cart-total').innerText}?`);
      if(!confirmPesan) return;

      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<div class="w-full text-center py-2 font-bold text-amber-400 tracking-wide animate-pulse">Memproses Pesanan...</div>';
      btn.disabled = true;
      
      const payload = {
        meja: document.getElementById('nomor-meja').innerText,
        items: cart.map(c => ({ nama: c.Nama, qty: c.qty, sub: c.Harga * c.qty })),
        total: cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0)
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'submitOrder', payload: payload })
        });
        const result = await response.json();
        
        if(result.status === "Success") {
          alert("Pesanan Diterima! Nomor Order: " + result.orderId + "\nChef kami sedang mempersiapkan hidangan Anda.");
          cart = [];
          localStorage.removeItem('resto_cart');
          updateCartUI();
        }
      } catch (error) {
        alert("Mohon maaf, koneksi terputus. Silakan coba lagi.");
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    }

    async function callWaiter() {
      const meja = document.getElementById('nomor-meja').innerText;
      const confirmCall = confirm(`Panggil pelayan ke Meja ${meja}?`);
      
      if(confirmCall) {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'callWaiter', meja: meja })
          });
          const result = await response.json();
          if(result.status === "Success") alert("Terima kasih. Staf kami akan segera menghampiri meja Anda.");
        } catch (error) {
          alert("Gagal memanggil pelayan. Periksa koneksi internet Anda.");
        }
      }
    }
  </script>
</body>
</html>
