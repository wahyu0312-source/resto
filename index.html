<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu Digital Eksklusif</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#18181b"> 
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif-premium { font-family: 'Playfair Display', serif; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="bg-stone-50 text-zinc-800 pb-32 antialiased">

  <!-- HEADER -->
  <nav class="bg-zinc-900 text-stone-100 p-5 shadow-lg sticky top-0 z-30 rounded-b-3xl">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
      <div class="flex flex-col">
        <h1 class="text-2xl font-serif-premium tracking-wide text-amber-400">SmartResto</h1>
        <p class="text-xs text-zinc-400 tracking-widest uppercase mt-1">Fine Culinary</p>
      </div>
      <div class="bg-zinc-800 border border-zinc-700 px-4 py-2 rounded-2xl flex items-center shadow-inner">
        <span class="text-xs text-zinc-400 mr-2 uppercase tracking-wide">Table</span>
        <span id="nomor-meja" class="font-bold text-amber-400 text-lg">1</span>
      </div>
    </div>
  </nav>

  <!-- KONTEN MENU -->
  <div class="max-w-4xl mx-auto p-5 mt-4">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-serif-premium text-zinc-900">Menu Pilihan Kami</h2>
      <div class="w-16 h-1 bg-amber-500 mx-auto mt-4 rounded-full"></div>
    </div>

    <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 gap-5">
      <div class="col-span-full flex justify-center py-10">
        <div class="animate-pulse flex flex-col items-center">
          <div class="w-10 h-10 border-4 border-zinc-200 border-t-amber-500 rounded-full animate-spin"></div>
          <p class="text-zinc-400 mt-4 text-sm tracking-wide">Menyiapkan hidangan...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- FLOATING CALL WAITER -->
  <button onclick="callWaiter()" class="fixed bottom-28 right-5 w-14 h-14 bg-white border border-zinc-200 text-zinc-800 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] flex items-center justify-center z-20 hover:bg-zinc-50 transition-transform active:scale-95 group">
    <span class="text-2xl relative">🔔</span>
  </button>

  <!-- FLOATING CART BUTTON (Membuka Modal) -->
  <div class="fixed bottom-6 left-0 right-0 z-30 px-5 pointer-events-none">
    <div class="max-w-4xl mx-auto pointer-events-auto">
      <button onclick="openCart()" class="w-full bg-zinc-900 text-white px-6 py-4 rounded-3xl shadow-[0_20px_40px_rgb(0,0,0,0.2)] flex justify-between items-center transform transition active:scale-[0.98]">
        <div class="flex items-center gap-3">
          <div class="bg-zinc-800 w-10 h-10 rounded-full flex items-center justify-center border border-zinc-700">
            <span>🛒</span>
          </div>
          <div class="text-left">
            <p class="text-xs text-zinc-400 font-medium">Keranjang Anda</p>
            <p class="font-bold text-sm"><span id="cart-count">0</span> Hidangan</p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-xs text-zinc-400 font-medium">Lihat Detail</p>
          <p class="font-bold text-amber-400 text-lg">Rp <span id="cart-total">0</span></p>
        </div>
      </button>
    </div>
  </div>

  <!-- ================= MODAL KERANJANG (Cart Pop-up) ================= -->
  <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end md:justify-center items-center transition-opacity">
    <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl p-6 pb-10 shadow-2xl flex flex-col max-h-[85vh]">
      
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-serif-premium font-bold text-zinc-900">Pesanan Anda</h2>
        <button onclick="closeCart()" class="text-zinc-400 hover:text-zinc-800 text-3xl leading-none">&times;</button>
      </div>
      
      <!-- List Item di Keranjang -->
      <div id="cart-modal-items" class="overflow-y-auto flex-grow mb-6 space-y-4 pr-2">
        <!-- Item akan di-render di sini via JS -->
      </div>
      
      <div class="border-t border-stone-200 pt-4 mb-6">
        <div class="flex justify-between items-center font-bold text-lg">
          <span class="text-zinc-800">Total Tagihan</span>
          <span class="text-amber-500 text-xl">Rp <span id="modal-total">0</span></span>
        </div>
      </div>
      
      <button id="btn-submit-order" onclick="submitOrder()" class="w-full bg-zinc-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-zinc-800 transition active:scale-95">
        Kirim ke Dapur
      </button>

    </div>
  </div>

  <!-- JAVASCRIPT -->
  <script>
    // MASUKKAN URL API ANDA DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';
    
    let globalMenu = [];
    let cart = JSON.parse(localStorage.getItem('resto_cart')) || []; 

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('meja')) document.getElementById('nomor-meja').innerText = urlParams.get('meja');

    window.onload = () => {
      fetchMenu();
      updateCartUI();
    };

    async function fetchMenu() {
      try {
        const response = await fetch(`${API_URL}?action=getMenu`);
        globalMenu = await response.json();
        renderMenu();
      } catch (error) {
        document.getElementById('menu-container').innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat menu.</p>';
      }
    }

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = '';
      const fallbackImage = "https://images.unsplash.com/photo-1414235077428-33898dd1458c?auto=format&fit=crop&w=500&q=60";

      globalMenu.forEach(item => {
        if(item.Status === 'Tersedia') {
          const card = `
            <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-stone-100 overflow-hidden flex flex-col transition-transform duration-300 hover:-translate-y-1">
              <div class="h-40 md:h-56 bg-stone-200 relative overflow-hidden group">
                <img src="${item.URL_Gambar}" alt="${item.Nama}" onerror="this.onerror=null; this.src='${fallbackImage}';" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
              </div>
              <div class="p-4 flex flex-col flex-grow">
                <h3 class="font-serif-premium font-bold text-base md:text-lg text-zinc-900 leading-snug">${item.Nama}</h3>
                <p class="text-xs text-zinc-500 mt-2 mb-4 line-clamp-2">${item.Deskripsi || ''}</p>
                <div class="mt-auto pt-3 border-t border-stone-100 flex justify-between items-center">
                  <p class="text-zinc-900 font-bold text-sm md:text-base">Rp ${item.Harga.toLocaleString('id-ID')}</p>
                  <button onclick="addToCart('${item.ID_Menu}')" class="bg-zinc-900 text-white w-8 h-8 md:w-10 md:h-10 rounded-full flex items-center justify-center font-bold hover:bg-amber-500 hover:text-zinc-900 transition-colors shadow-md active:scale-90">+</button>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        }
      });
    }

    function addToCart(id) {
      const item = globalMenu.find(m => m.ID_Menu === id);
      const exist = cart.find(c => c.ID_Menu === id);
      if(exist) exist.qty++;
      else cart.push({...item, qty: 1});
      
      localStorage.setItem('resto_cart', JSON.stringify(cart));
      updateCartUI();
      if (navigator.vibrate) navigator.vibrate(50);
    }

    function updateCartUI() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0);
      document.getElementById('cart-count').innerText = totalQty;
      document.getElementById('cart-total').innerText = totalPrice.toLocaleString('id-ID');
      document.getElementById('modal-total').innerText = totalPrice.toLocaleString('id-ID');
    }

    // --- FUNGSI MODAL KERANJANG (+ / -) ---
    function openCart() {
      if(cart.length === 0) return alert("Keranjang Anda masih kosong.");
      document.getElementById('cart-modal').classList.remove('hidden');
      document.getElementById('cart-modal').classList.add('flex');
      renderCartModal();
    }

    function closeCart() {
      document.getElementById('cart-modal').classList.add('hidden');
      document.getElementById('cart-modal').classList.remove('flex');
    }

    function renderCartModal() {
      const container = document.getElementById('cart-modal-items');
      container.innerHTML = '';
      
      cart.forEach(item => {
        container.innerHTML += `
          <div class="flex justify-between items-center bg-stone-50 p-3 rounded-2xl border border-stone-100">
            <div class="flex-1 pr-2">
              <p class="font-bold text-zinc-800 text-sm md:text-base leading-tight">${item.Nama}</p>
              <p class="text-xs text-amber-600 font-bold mt-1">Rp ${(item.Harga * item.qty).toLocaleString('id-ID')}</p>
            </div>
            <div class="flex items-center gap-3 bg-white border border-stone-200 rounded-full px-2 py-1 shadow-sm">
              <button onclick="changeQty('${item.ID_Menu}', -1)" class="w-7 h-7 bg-stone-100 text-zinc-600 rounded-full font-bold hover:bg-stone-200">-</button>
              <span class="font-bold text-sm w-4 text-center text-zinc-800">${item.qty}</span>
              <button onclick="changeQty('${item.ID_Menu}', 1)" class="w-7 h-7 bg-zinc-800 text-white rounded-full font-bold hover:bg-zinc-700">+</button>
            </div>
          </div>
        `;
      });
    }

    function changeQty(id, delta) {
      const item = cart.find(c => c.ID_Menu === id);
      if(item) {
        item.qty += delta;
        if(item.qty <= 0) cart = cart.filter(c => c.ID_Menu !== id); // Hapus jika 0
        
        localStorage.setItem('resto_cart', JSON.stringify(cart));
        updateCartUI();
        
        if(cart.length === 0) closeCart();
        else renderCartModal();
      }
    }

    // --- FUNGSI KIRIM PESANAN ---
    async function submitOrder() {
      const btn = document.getElementById('btn-submit-order');
      btn.innerText = 'Mengirim Pesanan...';
      btn.disabled = true;
      
      const payload = {
        meja: document.getElementById('nomor-meja').innerText,
        items: cart.map(c => ({ nama: c.Nama, qty: c.qty, sub: c.Harga * c.qty })),
        total: cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0)
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'submitOrder', payload: payload })
        });
        const result = await response.json();
        
        if(result.status === "Success") {
          alert("Pesanan Diterima! Nomor Order: " + result.orderId);
          cart = [];
          localStorage.removeItem('resto_cart');
          updateCartUI();
          closeCart();
        }
      } catch (error) {
        alert("Koneksi terputus. Silakan coba lagi.");
      } finally {
        btn.innerText = 'Kirim ke Dapur';
        btn.disabled = false;
      }
    }

    async function callWaiter() {
      const meja = document.getElementById('nomor-meja').innerText;
      if(confirm(`Panggil pelayan ke Meja ${meja}?`)) {
        try {
          await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'callWaiter', meja: meja }) });
          alert("Staf kami akan segera menghampiri meja Anda.");
        } catch (error) { alert("Gagal memanggil pelayan."); }
      }
    }
  </script>
</body>
</html>
