<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu Digital Eksklusif</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#18181b"> 
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif-premium { font-family: 'Playfair Display', serif; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
  </style>
</head>
<body class="bg-stone-50 text-zinc-800 pb-32 antialiased overflow-x-hidden">

  <!-- ================= SIDEBAR (BURGER MENU) ================= -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-50 hidden transition-opacity duration-300 opacity-0" onclick="toggleSidebar()"></div>
  <div id="sidebar" class="fixed top-0 left-0 bottom-0 w-64 bg-zinc-900 text-stone-100 z-50 transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    <div class="p-5 border-b border-zinc-800 flex justify-between items-center">
      <h2 class="text-xl font-serif-premium text-amber-400">SmartResto</h2>
      <button onclick="toggleSidebar()" class="text-zinc-400 hover:text-white text-3xl leading-none">&times;</button>
    </div>
    <div class="flex flex-col p-4 space-y-2 flex-grow">
      <button onclick="toggleSidebar()" class="text-left py-3 px-4 rounded-xl hover:bg-zinc-800 transition flex items-center gap-3">
        <span>🍽️</span> Halaman Menu
      </button>
      <button onclick="toggleSidebar(); openCart();" class="text-left py-3 px-4 rounded-xl hover:bg-zinc-800 transition flex items-center gap-3">
        <span>🛒</span> Keranjang Saya
      </button>
      <button onclick="toggleSidebar(); callWaiter();" class="text-left py-3 px-4 rounded-xl hover:bg-zinc-800 transition flex items-center gap-3">
        <span>🔔</span> Panggil Pelayan
      </button>
    </div>
    <div class="p-4 border-t border-zinc-800 text-xs text-zinc-500 text-center">
      Fine Culinary Experience &copy; 2026
    </div>
  </div>

  <!-- ================= HEADER DENGAN BURGER BUTTON ================= -->
  <nav class="bg-zinc-900 text-stone-100 p-4 shadow-lg sticky top-0 z-40 rounded-b-3xl">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
      <div class="flex items-center gap-3">
        <!-- Burger Button -->
        <button onclick="toggleSidebar()" class="p-2 -ml-2 text-zinc-300 hover:text-white transition active:scale-95">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="flex flex-col">
          <h1 class="text-xl font-serif-premium tracking-wide text-amber-400">SmartResto</h1>
        </div>
      </div>
      <div class="bg-zinc-800 border border-zinc-700 px-3 py-1.5 rounded-xl flex items-center shadow-inner">
        <span class="text-xs text-zinc-400 mr-2 uppercase tracking-wide hidden md:inline">Table</span>
        <span id="nomor-meja" class="font-bold text-amber-400 text-lg">1</span>
      </div>
    </div>
  </nav>

  <!-- ================= KONTEN MENU ================= -->
  <div class="max-w-4xl mx-auto p-5 mt-2">
    <div class="mb-6 text-center">
      <h2 class="text-2xl md:text-3xl font-serif-premium text-zinc-900">Menu Pilihan Kami</h2>
      <div class="w-12 h-1 bg-amber-500 mx-auto mt-3 rounded-full"></div>
    </div>

    <!-- Grid Menu -->
    <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-5">
      <div class="col-span-full flex justify-center py-10">
        <div class="animate-pulse flex flex-col items-center">
          <div class="w-10 h-10 border-4 border-zinc-200 border-t-amber-500 rounded-full animate-spin"></div>
          <p class="text-zinc-400 mt-4 text-sm tracking-wide">Menyiapkan hidangan...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= FLOATING CART BAR ================= -->
  <div class="fixed bottom-6 left-0 right-0 z-30 px-4 pointer-events-none transition-transform duration-300 transform translate-y-24" id="floating-cart">
    <div class="max-w-4xl mx-auto pointer-events-auto">
      <button onclick="openCart()" class="w-full bg-zinc-900 text-white px-5 py-4 rounded-3xl shadow-[0_20px_40px_rgb(0,0,0,0.3)] flex justify-between items-center transform transition active:scale-[0.98]">
        <div class="flex items-center gap-3">
          <div class="bg-amber-500 text-zinc-900 w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg shadow-inner">
            <span id="cart-count">0</span>
          </div>
          <div class="text-left hidden xs:block">
            <p class="text-xs text-zinc-400 font-medium">Lihat Detail</p>
          </div>
        </div>
        <div class="text-right">
          <p class="text-xs text-zinc-400 font-medium">Total Tagihan</p>
          <p class="font-bold text-amber-400 text-lg">Rp <span id="cart-total">0</span></p>
        </div>
      </button>
    </div>
  </div>

  <!-- ================= MODAL KERANJANG (Cart Pop-up) ================= -->
  <div id="cart-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex-col justify-end md:justify-center items-center transition-opacity">
    <div class="bg-white w-full max-w-lg rounded-t-3xl md:rounded-3xl p-6 pb-10 shadow-2xl flex flex-col max-h-[85vh]">
      
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-serif-premium font-bold text-zinc-900">Pesanan Anda</h2>
        <button onclick="closeCart()" class="text-zinc-400 hover:text-zinc-800 text-3xl leading-none">&times;</button>
      </div>
      
      <div id="cart-modal-items" class="overflow-y-auto flex-grow mb-6 space-y-4 pr-2"></div>
      
      <div class="border-t border-stone-200 pt-4 mb-6">
        <div class="flex justify-between items-center font-bold text-lg">
          <span class="text-zinc-800">Total Tagihan</span>
          <span class="text-amber-500 text-xl">Rp <span id="modal-total">0</span></span>
        </div>
      </div>
      
      <button id="btn-submit-order" onclick="submitOrder()" class="w-full bg-zinc-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-zinc-800 transition active:scale-95">
        Kirim ke Dapur
      </button>
    </div>
  </div>

  <!-- ================= JAVASCRIPT ================= -->
  <script>
    // MASUKKAN URL API GOOGLE APPS SCRIPT ANDA DI SINI
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';
    
    let globalMenu = [];
    let cart = JSON.parse(localStorage.getItem('resto_cart')) || []; 

    // Fitur PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // Ambil parameter Meja dari URL
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('meja')) document.getElementById('nomor-meja').innerText = urlParams.get('meja');

    window.onload = () => {
      fetchMenu();
      updateCartUI();
    };

    // --- FUNGSI SIDEBAR (BURGER MENU) ---
    function toggleSidebar() {
      const overlay = document.getElementById('sidebar-overlay');
      const sidebar = document.getElementById('sidebar');
      
      if (overlay.classList.contains('hidden')) {
        // Buka Sidebar
        overlay.classList.remove('hidden');
        setTimeout(() => {
          overlay.classList.remove('opacity-0');
          sidebar.classList.remove('-translate-x-full');
        }, 10);
      } else {
        // Tutup Sidebar
        overlay.classList.add('opacity-0');
        sidebar.classList.add('-translate-x-full');
        setTimeout(() => {
          overlay.classList.add('hidden');
        }, 300);
      }
    }

    // --- FUNGSI RENDER MENU ---
    async function fetchMenu() {
      try {
        const response = await fetch(`${API_URL}?action=getMenu`);
        globalMenu = await response.json();
        renderMenu();
      } catch (error) {
        document.getElementById('menu-container').innerHTML = '<p class="text-red-500 text-center col-span-full">Gagal memuat menu. Pastikan koneksi lancar.</p>';
      }
    }

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = '';
      const fallbackImage = "https://images.unsplash.com/photo-1414235077428-33898dd1458c?auto=format&fit=crop&w=500&q=60";

      globalMenu.forEach(item => {
        if(item.Status === 'Tersedia') {
          const card = `
            <div class="bg-white rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-stone-100 overflow-hidden flex flex-col transition-transform hover:-translate-y-1">
              <div class="h-36 md:h-48 bg-stone-200 relative overflow-hidden group">
                <img src="${item.URL_Gambar}" onerror="this.onerror=null; this.src='${fallbackImage}';" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
              </div>
              <div class="p-3 md:p-4 flex flex-col flex-grow">
                <h3 class="font-serif-premium font-bold text-sm md:text-lg text-zinc-900 leading-tight">${item.Nama}</h3>
                <p class="text-[10px] md:text-xs text-zinc-500 mt-1 mb-3 line-clamp-2">${item.Deskripsi || ''}</p>
                
                <div class="mt-auto pt-2 border-t border-stone-100 flex justify-between items-center h-10">
                  <p class="text-zinc-900 font-bold text-xs md:text-sm">Rp ${item.Harga.toLocaleString('id-ID')}</p>
                  
                  <!-- Area Tombol Dinamis -->
                  <div id="btn-area-${item.ID_Menu}">
                    ${getCardButtonHTML(item.ID_Menu)}
                  </div>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        }
      });
    }

    // Mengubah HTML tombol di Menu (antara "+" atau "- 1 +")
    function getCardButtonHTML(id) {
      const cartItem = cart.find(c => c.ID_Menu === id);
      const qty = cartItem ? cartItem.qty : 0;

      if (qty > 0) {
        return `
          <div class="flex items-center gap-2 bg-zinc-100 rounded-full border border-zinc-200 p-0.5">
            <button onclick="changeQty('${id}', -1)" class="w-6 h-6 md:w-8 md:h-8 bg-white text-zinc-800 rounded-full font-bold shadow-sm hover:bg-zinc-200 active:scale-90 transition-transform">-</button>
            <span class="font-bold text-xs md:text-sm w-3 md:w-4 text-center text-zinc-800">${qty}</span>
            <button onclick="changeQty('${id}', 1)" class="w-6 h-6 md:w-8 md:h-8 bg-zinc-900 text-white rounded-full font-bold shadow-sm hover:bg-amber-500 hover:text-zinc-900 active:scale-90 transition-all">+</button>
          </div>
        `;
      } else {
        return `
          <button onclick="changeQty('${id}', 1)" class="bg-zinc-900 text-white w-7 h-7 md:w-9 md:h-9 rounded-full flex items-center justify-center font-bold hover:bg-amber-500 hover:text-zinc-900 shadow-md active:scale-90 transition-all">+</button>
        `;
      }
    }

    // Fungsi Utama Tambah/Kurang (Bisa dipanggil dari Grid Menu ATAU Modal Keranjang)
    function changeQty(id, delta) {
      const item = globalMenu.find(m => m.ID_Menu === id);
      let cartItem = cart.find(c => c.ID_Menu === id);

      if (!cartItem && delta > 0) {
        cart.push({...item, qty: 1});
      } else if (cartItem) {
        cartItem.qty += delta;
        if (cartItem.qty <= 0) {
          cart = cart.filter(c => c.ID_Menu !== id);
        }
      }
      
      localStorage.setItem('resto_cart', JSON.stringify(cart));
      updateCartUI();

      // Update Tampilan Tombol di Card Menu tanpa mereload seluruh halaman
      const btnArea = document.getElementById(`btn-area-${id}`);
      if(btnArea) btnArea.innerHTML = getCardButtonHTML(id);

      // Jika modal sedang terbuka, perbarui juga tampilan modalnya
      if(!document.getElementById('cart-modal').classList.contains('hidden')) {
        if(cart.length === 0) closeCart();
        else renderCartModal();
      }

      if (navigator.vibrate) navigator.vibrate(30);
    }

    function updateCartUI() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0);
      
      document.getElementById('cart-count').innerText = totalQty;
      document.getElementById('cart-total').innerText = totalPrice.toLocaleString('id-ID');
      document.getElementById('modal-total').innerText = totalPrice.toLocaleString('id-ID');

      // Animasi Floating Bar (Muncul kalau ada barang, sembunyi kalau 0)
      const floatingCart = document.getElementById('floating-cart');
      if (totalQty > 0) {
        floatingCart.classList.remove('translate-y-24');
      } else {
        floatingCart.classList.add('translate-y-24');
      }
    }

    // --- FUNGSI MODAL KERANJANG ---
    function openCart() {
      if(cart.length === 0) return alert("Keranjang Anda masih kosong.");
      document.getElementById('cart-modal').classList.remove('hidden');
      document.getElementById('cart-modal').classList.add('flex');
      renderCartModal();
    }

    function closeCart() {
      document.getElementById('cart-modal').classList.add('hidden');
      document.getElementById('cart-modal').classList.remove('flex');
    }

    function renderCartModal() {
      const container = document.getElementById('cart-modal-items');
      container.innerHTML = '';
      
      cart.forEach(item => {
        container.innerHTML += `
          <div class="flex justify-between items-center bg-stone-50 p-3 rounded-2xl border border-stone-100">
            <div class="flex-1 pr-2">
              <p class="font-bold text-zinc-800 text-sm leading-tight">${item.Nama}</p>
              <p class="text-xs text-amber-600 font-bold mt-1">Rp ${(item.Harga * item.qty).toLocaleString('id-ID')}</p>
            </div>
            <div class="flex items-center gap-2 bg-white border border-stone-200 rounded-full p-1 shadow-sm">
              <button onclick="changeQty('${item.ID_Menu}', -1)" class="w-6 h-6 bg-stone-100 text-zinc-600 rounded-full font-bold hover:bg-stone-200 active:scale-90">-</button>
              <span class="font-bold text-sm w-4 text-center text-zinc-800">${item.qty}</span>
              <button onclick="changeQty('${item.ID_Menu}', 1)" class="w-6 h-6 bg-zinc-900 text-white rounded-full font-bold hover:bg-zinc-700 active:scale-90">+</button>
            </div>
          </div>
        `;
      });
    }

    // --- FUNGSI KIRIM PESANAN ---
    async function submitOrder() {
      const btn = document.getElementById('btn-submit-order');
      btn.innerText = 'Mengirim Pesanan...';
      btn.disabled = true;
      
      const payload = {
        meja: document.getElementById('nomor-meja').innerText,
        items: cart.map(c => ({ nama: c.Nama, qty: c.qty, sub: c.Harga * c.qty })),
        total: cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0)
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'submitOrder', payload: payload })
        });
        const result = await response.json();
        
        if(result.status === "Success") {
          alert("Pesanan Diterima! Nomor Order: " + result.orderId);
          cart = [];
          localStorage.removeItem('resto_cart');
          updateCartUI();
          renderMenu(); // Reset semua tombol menjadi '+'
          closeCart();
        }
      } catch (error) {
        alert("Koneksi terputus. Silakan coba lagi.");
      } finally {
        btn.innerText = 'Kirim ke Dapur';
        btn.disabled = false;
      }
    }

    // --- FUNGSI PANGGIL PELAYAN ---
    async function callWaiter() {
      const meja = document.getElementById('nomor-meja').innerText;
      if(confirm(`Panggil pelayan ke Meja ${meja}?`)) {
        try {
          await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'callWaiter', meja: meja }) });
          alert("Bantuan segera datang. Staf kami akan menghampiri meja Anda.");
        } catch (error) { alert("Gagal memanggil pelayan. Pastikan internet Anda aktif."); }
      }
    }
  </script>
</body>
</html>
