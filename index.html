<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartResto PWA</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

  <nav class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-40">
    <div class="flex justify-between items-center max-w-4xl mx-auto">
      <h1 class="text-xl font-bold">🍴 SmartResto</h1>
      <span class="bg-indigo-800 px-3 py-1 rounded-full text-sm">Meja: <span id="nomor-meja">1</span></span>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto p-4">
    <!-- Grid Menu dengan Gambar -->
    <div id="menu-container" class="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">
      <p class="text-center col-span-2 text-gray-500 animate-pulse">Memuat menu yang lezat...</p>
    </div>
  </div>

  <!-- Floating Cart Button -->
  <div class="fixed bottom-4 left-0 right-0 max-w-4xl mx-auto px-4 z-40">
    <button onclick="submitOrder()" class="w-full bg-green-600 text-white p-4 rounded-xl shadow-2xl font-bold flex justify-between items-center transform transition active:scale-95">
      <span>🛒 <span id="cart-count">0</span> Item</span>
      <span>Checkout: Rp <span id="cart-total">0</span></span>
    </button>
  </div>

  <script>
    // URL Backend GAS
    const API_URL = 'https://script.google.com/macros/s/AKfycbz4koq2EY4neFp6YyVsMTqcD-oM6WQNnp-_PofT96MWG0JfWBW1sZz6QgomwRksXVga/exec';
    
    let globalMenu = [];
    let cart = JSON.parse(localStorage.getItem('resto_cart')) || []; // IDE 1: Load cart dari Local Storage

    // Registrasi Service Worker (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => console.log('PWA Service Worker Registered'));
    }

    // Ambil parameter meja dari URL (misal: ?meja=5)
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.has('meja')) document.getElementById('nomor-meja').innerText = urlParams.get('meja');

    window.onload = () => {
      fetchMenu();
      updateCartUI();
    };

    async function fetchMenu() {
      try {
        const response = await fetch(`${API_URL}?action=getMenu`);
        globalMenu = await response.json();
        renderMenu();
      } catch (error) {
        document.getElementById('menu-container').innerHTML = '<p class="text-red-500">Gagal memuat menu. Coba refresh.</p>';
      }
    }

    function renderMenu() {
      const container = document.getElementById('menu-container');
      container.innerHTML = '';

      globalMenu.forEach(item => {
        if(item.Status === 'Tersedia') {
          // Desain Card Menu dengan Gambar (Rasio 1:1)
          const card = `
            <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100 flex flex-col">
              <img src="${item.URL_Gambar}" alt="${item.Nama}" class="w-full h-32 md:h-48 object-cover bg-gray-200" loading="lazy">
              <div class="p-3 flex flex-col flex-grow">
                <h3 class="font-bold text-sm md:text-base leading-tight">${item.Nama}</h3>
                <p class="text-xs text-gray-500 mt-1 mb-2 line-clamp-2">${item.Deskripsi}</p>
                <div class="mt-auto flex justify-between items-center">
                  <p class="text-indigo-600 font-bold text-sm">Rp ${item.Harga.toLocaleString('id-ID')}</p>
                  <button onclick="addToCart('${item.ID_Menu}')" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold active:bg-indigo-200">+</button>
                </div>
              </div>
            </div>
          `;
          container.innerHTML += card;
        }
      });
    }

    function addToCart(id) {
      const item = globalMenu.find(m => m.ID_Menu === id);
      const exist = cart.find(c => c.ID_Menu === id);
      if(exist) exist.qty++;
      else cart.push({...item, qty: 1});
      
      localStorage.setItem('resto_cart', JSON.stringify(cart)); // IDE 1: Simpan ke Local Storage
      updateCartUI();
    }

    function updateCartUI() {
      const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0);
      document.getElementById('cart-count').innerText = totalQty;
      document.getElementById('cart-total').innerText = totalPrice.toLocaleString('id-ID');
    }

    async function submitOrder() {
      if(cart.length === 0) return alert("Keranjang masih kosong.");
      
      const btn = event.currentTarget;
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="mx-auto">Memproses...</span>';
      
      const payload = {
        meja: document.getElementById('nomor-meja').innerText,
        items: cart.map(c => ({ nama: c.Nama, qty: c.qty, sub: c.Harga * c.qty })),
        total: cart.reduce((sum, item) => sum + (item.Harga * item.qty), 0)
      };

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'submitOrder', payload: payload })
        });
        const result = await response.json();
        
        if(result.status === "Success") {
          alert("Pesanan Sukses! Kode: " + result.orderId);
          cart = [];
          localStorage.removeItem('resto_cart'); // Kosongkan Local Storage
          updateCartUI();
        }
      } catch (error) {
        alert("Gagal mengirim pesanan. Periksa koneksi.");
      } finally {
        btn.innerHTML = originalText;
      }
    }
  </script>
</body>
</html>
